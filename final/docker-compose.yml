services:

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marazul-backend
    ports:
      - "8070:8070"
    environment:
      # Base de datos (Supabase cloud — se puede sobreescribir con .env)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres.mgssrqfsmbitiobsvrlw}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-fUVzg4B9xLb7piJx}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8070
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8070/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend React (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marazul-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
